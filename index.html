<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Static fallback meta for social crawlers that don't run JS.
      react-helmet-async overrides these at runtime for each page.
    -->
    <title>The Finance Wizard Group | Partner With Top Insurance Agency</title>
    <meta name="description" content="Join The Finance Wizard Group — 80–100% commission rates vested day one, direct-to-carrier access, in-house leads & underwriting, and a brand-scaling engine built for insurance professionals ready to grow." />
    <link rel="canonical" href="https://thefinancewizardgroup.com" />

    <!-- Open Graph (static fallback) -->
    <meta property="og:site_name" content="The Finance Wizard Group" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thefinancewizardgroup.com" />
    <meta property="og:title" content="The Finance Wizard Group | Partner With Top Insurance Agency" />
    <meta property="og:description" content="Join The Finance Wizard Group — 80–100% commission rates vested day one, direct-to-carrier access, in-house leads & underwriting, and a brand-scaling engine built for insurance professionals ready to grow." />
    <meta property="og:image" content="https://thefinancewizardgroup.com/images/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card (static fallback) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Finance Wizard Group | Partner With Top Insurance Agency" />
    <meta name="twitter:description" content="Join The Finance Wizard Group — 80–100% commission rates vested day one, direct-to-carrier access, in-house leads & underwriting, and a brand-scaling engine built for insurance professionals ready to grow." />
    <meta name="twitter:image" content="https://thefinancewizardgroup.com/images/og-image.jpg" />

    <!-- Preload critical above-the-fold image (logo shown in navbar) -->
    <link rel="preload" as="image" href="/images/logo.jpg" fetchpriority="high" />

    <!-- Preconnect to EmailJS so form submissions are faster -->
    <link rel="preconnect" href="https://api.emailjs.com" />
    <link rel="dns-prefetch" href="https://api.emailjs.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
